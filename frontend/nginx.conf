# ============================================================================
# Future AGI frontend — OSS nginx config
#
# Plain HTTP on port 80. Domain-agnostic (server_name _).
# For TLS in production, put Caddy / ALB / Cloudflare in front of this
# container — don't terminate TLS here.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    client_max_body_size 1G;

    # Base security headers (HSTS intentionally omitted — add at TLS layer).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Exact match — never cache, regenerated per container start by docker-entrypoint.sh.
    location = /config.js {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        default_type application/javascript;
    }

    # Cache Vite build assets aggressively (hashed filenames)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the SPA entry point
    location ~* \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA fallback — client-side router handles unknown paths
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
