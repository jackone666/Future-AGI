# nsjail configuration for Python/JS code execution
# Security via: namespaces + cgroups + rlimits (no seccomp to avoid arch issues)

name: "eval-sandbox"
description: "Sandboxed code execution for eval functions"

mode: ONCE
hostname: "sandbox"

# Time limit
time_limit: 30

# Resource limits
# 1024 MB virtual address space — needed for nltk/numpy/scipy/sklearn which
# reserve a lot of virtual memory even when only small portions are used.
rlimit_as_type: SOFT
rlimit_as: 1024
rlimit_cpu_type: HARD
rlimit_cpu: 30
rlimit_fsize_type: HARD
rlimit_fsize: 1
rlimit_nofile_type: HARD
rlimit_nofile: 32
rlimit_nproc_type: HARD
rlimit_nproc: 32

# Logging
log_level: WARNING
silent: true

# Namespace isolation
clone_newpid: true
clone_newns: true
clone_newnet: true
clone_newuser: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# UID/GID mapping
uidmap {
    inside_id: "1000"
    outside_id: "1000"
    count: 1
}
gidmap {
    inside_id: "1000"
    outside_id: "1000"
    count: 1
}

# Read-only root filesystem
mount {
    src: "/"
    dst: "/"
    is_bind: true
    rw: false
}

# Writable /tmp
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=16m"
}

# /dev/null and /dev/urandom
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}
mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# /proc (needed by Python runtime)
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}
