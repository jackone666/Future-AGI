[pytest]
# Pytest configuration for model serving

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --color=yes
    --maxfail=5
    -n auto
    --dist worksteal
    --ignore=.uv-cache
    --ignore=.pytest_cache
    --ignore=htmlcov
    --ignore=test-reports

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    serving: Model serving specific tests
    slow: Slow running tests
    serial: Tests that must run serially (not in parallel)
    network: Tests requiring network access
    model: Model loading/inference tests
    embedding: Embedding functionality tests
    api: API endpoint tests
    performance: Performance tests
    gpu: Tests requiring GPU

# Minimum Python version
minversion = 3.8

# Environment variables for tests (requires pytest-env plugin)
# Commented out due to missing pytest-env plugin
# env =
#     TESTING=true
#     LOG_LEVEL=WARNING
#     DISABLE_TELEMETRY=true

# Disable warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */test_*
    setup.py
    */venv/*
    */__pycache__/*
    app/__main__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.
    class .*\(Protocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2
