# SDK Integration Testing Infrastructure
# Includes test databases + serving service for full SDK testing
#
# Usage:
#   docker compose -f docker-compose.sdk-test.yml -p futureagi-sdk-test up -d
#
# Ports (18xxx-19xxx range to avoid collisions):
#   - PostgreSQL: 15432
#   - Redis: 16379
#   - ClickHouse: 19000 (native), 18123 (HTTP)
#   - MinIO: 19005 (API), 19006 (Console)
#   - Serving: 18080

services:
  # ===========================================
  # Test Databases (same as docker-compose.test.yml)
  # ===========================================

  test-db:
    image: postgres:16-alpine
    container_name: sdk-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_tfc
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_tfc"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    container_name: sdk-test-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-clickhouse:
    image: clickhouse/clickhouse-server:24.10.2.80
    container_name: sdk-test-clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-minio:
    image: minio/minio:latest
    container_name: sdk-test-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19005:9000"
      - "19006:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================
  # Model Serving Service
  # ===========================================

  serving:
    build:
      context: model_serving/
      dockerfile: Dockerfile.base
    container_name: sdk-test-serving
    working_dir: /app/embedding
    ports:
      - "18080:8080"
    volumes:
      - ./model_serving:/app/embedding
    environment:
      - OTEL_ENABLED=false
      - LOG_LEVEL=INFO
    command: gunicorn -w 1 -t 100 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8080 app.main:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

networks:
  default:
    name: futureagi-sdk-test-network
