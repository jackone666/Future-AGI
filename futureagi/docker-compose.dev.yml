# Development docker-compose override
# Uses a single Temporal worker for ALL queues (saves resources)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or set as default in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
#
# For tracing, add docker-compose.observability.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.observability.yml up

services:
  # Single Temporal worker for all queues (development only)
  temporal-worker-dev:
    platform: linux/amd64
    container_name: temporal-worker-dev
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_ALL_QUEUES=true
      - FAST_STARTUP=${FAST_STARTUP:-true}
      # Lower concurrency for dev (saves memory)
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_DEV_MAX_ACTIVITIES:-20}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_DEV_MAX_WORKFLOWS:-20}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # Disable individual queue workers in dev mode
  temporal-worker:
    profiles:
      - production

  temporal-worker-tasks-l:
    profiles:
      - production

  temporal-worker-tasks-xl:
    profiles:
      - production

  temporal-worker-tasks-s:
    profiles:
      - production

  temporal-worker-trace-ingestion:
    profiles:
      - production

  temporal-worker-agent-compass:
    profiles:
      - production
