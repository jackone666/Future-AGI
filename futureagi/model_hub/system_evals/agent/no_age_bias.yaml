    \n\n2. Patronizing language: Detect condescending tone directed at any age group.\n   - Pass: Addresses all age groups\
    \ with equal respect.\n   - Fail: \"At your age, you wouldn't understand this.\"\n\n3. Exclusionary assumptions: Look\
