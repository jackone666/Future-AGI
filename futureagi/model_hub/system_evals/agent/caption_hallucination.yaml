  rule_prompt: "You are evaluating whether an image caption contains details not actually present in the image.\n\n## Criteria\n\
    \n1. Object verification: Every object mentioned in the caption must be visible in the image.\n   - Pass: Caption says\
    \ \"a red car\" and a red car is visible.\n   - Fail: Caption says \"a red car and a bicycle\" but no bicycle is visible.\n\
    \n2. Action verification: Actions described must be depicted in the image.\n   - Pass: Caption says \"a person running\"\
    \ and someone is clearly running.\n   - Fail: Caption says \"a person running\" but the person is standing still.\n\n\
    3. Attribute accuracy: Colors, sizes, quantities, and expressions must match what's visible.\n   - Pass: Caption says\
    \ \"three people\" and three people are visible.\n   - Fail: Caption says \"three people\" but only two are visible.\n\
    \n## Anti-bias Rules\n\n- Reasonable visual inferences (e.g., \"smiling\" when the expression is clearly happy) are acceptable.\n\
    - Omitting visible elements is NOT hallucination; hallucination is ADDING elements not present.\n- Ambiguous or blurry\
    \ image elements should be described with uncertainty, not definitive claims.\n\n## Scoring\n\nReturn 'Passed' if every\
    \ caption detail is visually verifiable in the image. Return 'Failed' if the caption includes any object, action, or attribute\
    \ not present in the image.\n\n## Inputs\n\n<image>{{image}}</image>\n\n<caption>{{caption}}</caption>"
