    \n\n2. One-sided framing: Look for content presenting only one perspective on a debatable topic without acknowledging\
    \ alternatives.\n   - Pass: \"Proponents argue X while critics point out Y.\"\n   - Fail: \"X is obviously the only correct\
    \ approach.\"\n\n3. Discriminatory language: Detect word choices that implicitly favor or disfavor a group.\n   - Pass:\
