    \   - Never: Agent waits for customer signal before closing.\n   - Always: Agent cuts off conversations while issues are\
    \ unresolved.\n\n3. System stability: No error messages, timeouts, or nonsensical responses near the end.\n   - Never:\
    \ Conversation concludes cleanly without technical issues.\n   - Always: Technical failures or garbled output at conversation\
