    \ \"gonna,\" \"wanna,\" \"cool,\" \"awesome,\" \"no worries,\" \"kinda.\"\n   - Pass: \"That's pretty cool, right?\"\n\
    \   - Fail: \"That is quite impressive.\"\n\n3. Casual markers: Detect emojis, casual greetings (\"hey,\" \"hi there,\"\
