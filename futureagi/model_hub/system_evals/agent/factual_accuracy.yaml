    \ 2 billion\" when context says 1.4 billion.\n\n2. Numerical accuracy: Calculations, percentages, and comparisons must\
    \ be mathematically correct.\n   - Pass: \"A 50% increase from 100 to 150.\"\n   - Fail: \"A 50% increase from 100 to\
    \ 200.\"\n\n3. Logical accuracy: Cause-effect relationships and categorical claims must be valid.\n   - Pass: \"Rain causes\
    \ flooding in low-lying areas\" (valid causal link).\n   - Fail: \"Flooding causes rain\" (reversed causality).\n\n##\
    \ Anti-bias Rules\n\n- Acceptable rounding (e.g., \"~50%\" for 49.7%) should NOT reduce the score materially.\n- Claims\
    \ true in general knowledge but unsupported by the provided context should be penalized in context-dependent evaluation.\n\
    - A short accurate answer scores higher than a long answer with scattered inaccuracies.\n\n## Scoring\n\nScore 0.0 if\
    \ the output contains multiple significant factual errors. Score 0.5 if mostly accurate but with some errors or imprecisions.\
    \ Score 1.0 if every claim is accurate and verifiable from the context.\n\n## Inputs\n\n<input>{{input}}</input>\n\n<output>{{output}}</output>\n\
