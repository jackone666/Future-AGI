eval_id: 110
name: synthetic_image_evaluator
description: Evaluates if the given image is generated by AI/Computer Graphics or authentically created.
criteria: "You are evaluating whether a given image is AI-generated or synthetically produced versus authentically created.\n\
  \n## Criteria\n\n1. Visual artifacts: Check for texture inconsistencies, unnatural lighting, color bleeding, overly smooth\
  \ surfaces, or warped edges.\n   - AI indicator: Skin with no pores, hair that merges into background, inconsistent shadow\
  \ directions.\n   - Authentic indicator: Natural imperfections, consistent physics, organic textures.\n\n2. Anatomical/structural\
  \ accuracy: Look for human anatomy errors, impossible geometry, or perspective inconsistencies.\n   - AI indicator: Wrong\
  \ number of fingers, impossible architectural angles, inconsistent scale.\n   - Authentic indicator: Correct proportions,\
  \ consistent perspective, natural poses.\n\n3. Fine details: Inspect text, small objects, and background patterns.\n   -\
  \ AI indicator: Garbled text, repetitive patterns, oversmoothed small objects.\n   - Authentic indicator: Legible text,\
  \ natural variation in patterns, realistic detail.\n\n## Anti-bias Rules\n\n- Heavily post-processed photographs may look\
  \ AI-like but are NOT AI-generated.\n- Latest AI models may have few artifacts; absence of artifacts alone does NOT prove\
  \ authenticity.\n- Default assumption: AI-generated. Only classify as human-created if every artifact has a definitive non-AI\
  \ explanation.\n\n## Scoring\n\nScore 0.0 if the image appears definitively authentic with no AI indicators. Score 0.5 if\
  \ ambiguous with some suspicious artifacts but plausibly either. Score 1.0 if clear, multiple AI-generation indicators are\
  \ present.\n\n## Inputs\n\n<image>{{image}}</image>"
eval_tags:
- Image
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - image
  output: score
  eval_type_id: AgentEvaluator
  config_params_desc:
