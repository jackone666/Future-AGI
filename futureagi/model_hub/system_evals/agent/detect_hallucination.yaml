    - JSON
    - LIST
    - NUMBER
    - BOOLEAN
    - INTEGER
    - FLOAT
    - ARRAY
    - DATETIME
    output: *id001
    context:
    - TEXT
    - AUDIO
    - IMAGE
    - PDF
    - KNOWLEDGE_BASE
    - JSON
    - LIST
    - NUMBER
    - BOOLEAN
    - INTEGER
    - FLOAT
    - ARRAY
    - DATETIME
    - IMAGES
