eval_id: 105
name: text_to_sql
description: Evaluates if the model correctly converts natural language text into valid and accurate SQL queries.
criteria: "You are evaluating whether a generated SQL query correctly translates the user's natural language request.\n\n\
  ## Criteria\n\n1. Syntax validity: The SQL must parse correctly with proper keywords, clauses, joins, and operators.\n \
  \  - Pass: \"SELECT name FROM users WHERE age > 18 ORDER BY name\"\n   - Fail: \"SELCT name FORM users WERE age > 18\" (multiple\
  \ typos)\n\n2. Semantic correctness: The query must express the exact logic described in the natural language input.\n \
  \  - Pass: Input says \"users older than 18\" and WHERE clause is age > 18.\n   - Fail: Input says \"older than 18\" but\
  \ WHERE clause is age >= 18 or age < 18.\n\n3. Completeness: All conditions, filters, groupings, and orderings mentioned\
  \ in the input should be present.\n   - Pass: Input mentions filtering by date and ordering by name; both are in the query.\n\
  \   - Fail: Input mentions filtering by date but the query has no date condition.\n\n## Anti-bias Rules\n\n- Multiple valid\
  \ SQL formulations for the same query should all pass (subquery vs. JOIN, etc.).\n- If table/column names aren't specified\
  \ in input, reasonable assumptions should NOT cause failure.\n- SQL dialect differences (MySQL vs. PostgreSQL) should be\
  \ tolerated unless a specific dialect is required.\n\n## Scoring\n\nReturn 'Passed' if the SQL is syntactically valid and\
  \ correctly captures the intent and conditions. Return 'Failed' if it has syntax errors, wrong logic, or misses stated conditions.\n\
  \n## Inputs\n\n<input>{{input}}</input>\n\n<output>{{output}}</output>"
eval_tags:
- Code
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
choices:
- Passed
- Failed
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - input
  - output
  output: Pass/Fail
  eval_type_id: AgentEvaluator
  config: {}
  config_params_desc:
    input: The input text to be evaluated
    output: The output to be evaluated
  param_modalities:
    input: &id001
    - TEXT
    - JSON
    - LIST
    - NUMBER
    - BOOLEAN
    - INTEGER
    - FLOAT
    - ARRAY
    - DATETIME
    output: *id001
  rule_prompt: "You are evaluating whether a generated SQL query correctly translates the user's natural language request.\n\
    \n## Criteria\n\n1. Syntax validity: The SQL must parse correctly with proper keywords, clauses, joins, and operators.\n\
    \   - Pass: \"SELECT name FROM users WHERE age > 18 ORDER BY name\"\n   - Fail: \"SELCT name FORM users WERE age > 18\"\
    \ (multiple typos)\n\n2. Semantic correctness: The query must express the exact logic described in the natural language\
    \ input.\n   - Pass: Input says \"users older than 18\" and WHERE clause is age > 18.\n   - Fail: Input says \"older than\
    \ 18\" but WHERE clause is age >= 18 or age < 18.\n\n3. Completeness: All conditions, filters, groupings, and orderings\
    \ mentioned in the input should be present.\n   - Pass: Input mentions filtering by date and ordering by name; both are\
    \ in the query.\n   - Fail: Input mentions filtering by date but the query has no date condition.\n\n## Anti-bias Rules\n\
    \n- Multiple valid SQL formulations for the same query should all pass (subquery vs. JOIN, etc.).\n- If table/column names\
    \ aren't specified in input, reasonable assumptions should NOT cause failure.\n- SQL dialect differences (MySQL vs. PostgreSQL)\
    \ should be tolerated unless a specific dialect is required.\n\n## Scoring\n\nReturn 'Passed' if the SQL is syntactically\
    \ valid and correctly captures the intent and conditions. Return 'Failed' if it has syntax errors, wrong logic, or misses\
    \ stated conditions.\n\n## Inputs\n\n<input>{{input}}</input>\n\n<output>{{output}}</output>"
