eval_id: 27
name: length_less_than
description: Checks if text length is below threshold
eval_tags:
- Output Validation
- Text
visible_ui: false
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config:
    max_length:
      type: integer
      default: null
  config_params_desc:
    text: The input text to be evaluated
    max_length: The maximum allowed length of the text
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        text = kwargs.get("text", output or "")
        max_length = kwargs.get("max_length")
        text = str(text)
        if max_length is None:
            return {"score": 0.0, "reason": "No max_length provided"}
        max_length = int(max_length)
        text_len = len(text)
        if text_len < max_length:
            return {"score": 1.0, "reason": f"Text length ({text_len}) is less than {max_length}"}
        else:
            return {"score": 0.0, "reason": f"Text length ({text_len}) is not less than {max_length}"}
