eval_id: 141
name: gleu_score
description: Computes Google BLEU (GLEU) score. A sentence-level BLEU variant that takes the minimum of precision and recall
  for each n-gram order, making it more balanced than standard BLEU.
criteria: Measures sentence-level text generation quality using balanced n-gram precision and recall.
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: The reference/expected text
    hypothesis: The generated/output text
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import math
        from collections import Counter
        reference = kwargs.get("reference", expected or "")
        hypothesis = kwargs.get("hypothesis", output or "")
        if not reference or not hypothesis:
            return {"score": 0.0, "reason": "Missing reference or hypothesis"}
        ref_tokens = str(reference).lower().split()
        hyp_tokens = str(hypothesis).lower().split()
        if not ref_tokens or not hyp_tokens:
            return {"score": 0.0, "reason": "Empty tokens"}
        def _ngrams(tokens, n):
            return [tuple(tokens[i:i+n]) for i in range(len(tokens)-n+1)]
        max_n = min(4, len(ref_tokens), len(hyp_tokens))
        if max_n == 0:
            return {"score": 0.0, "reason": "GLEU: 0.0 (tokens too short)"}
        log_gleu = 0.0
        for n in range(1, max_n + 1):
            ref_ng = Counter(_ngrams(ref_tokens, n))
            hyp_ng = Counter(_ngrams(hyp_tokens, n))
            total_ref = sum(ref_ng.values())
            total_hyp = sum(hyp_ng.values())
            if total_hyp == 0 or total_ref == 0:
                return {"score": 0.0, "reason": f"GLEU: 0.0 (no {n}-grams)"}
            clipped = sum(min(hyp_ng[ng], ref_ng[ng]) for ng in hyp_ng)
            prec = clipped / total_hyp
            rec = clipped / total_ref
            gleu_n = min(prec, rec)
            if gleu_n == 0:
                return {"score": 0.0, "reason": f"GLEU: 0.0 (zero {n}-gram overlap)"}
            log_gleu += math.log(gleu_n)
        score = max(0.0, min(1.0, math.exp(log_gleu / max_n)))
        return {"score": float(score), "reason": f"GLEU: {score:.4f}"}
