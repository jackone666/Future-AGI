eval_id: 23
name: is_json
description: Validates if content is proper JSON format
eval_tags:
- Output Format
- Code
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    text: The input text to be evaluated for JSON validity
  code: |
    import json

    def evaluate(input, output, expected, context, **kwargs):
        text = kwargs.get("text", output or "")
        if isinstance(text, (dict, list)):
            return {"score": 1.0, "reason": "Text is valid JSON"}
        text = str(text)
        try:
            json.loads(text)
            return {"score": 1.0, "reason": "Text is valid JSON"}
        except (json.JSONDecodeError, ValueError) as e:
            return {"score": 0.0, "reason": f"Text is not valid JSON: {str(e)}"}
