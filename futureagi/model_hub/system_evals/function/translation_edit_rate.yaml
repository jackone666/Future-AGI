eval_id: 174
name: translation_edit_rate
description: Computes Translation Edit Rate (TER). TER measures the minimum number of edits (insertions, deletions, substitutions)
  needed to transform the hypothesis into the reference, normalized by reference length. Returns 1-TER (higher=better).
criteria: Measures translation quality by computing the minimum edit distance at the word level.
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: Reference translation
    hypothesis: System/generated translation
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        ref = str(kwargs.get("reference", expected or "")).strip().lower().split()
        hyp = str(kwargs.get("hypothesis", output or "")).strip().lower().split()
        if not ref and not hyp:
            return {"score": 1.0, "reason": "TER: 0.0 (both empty)"}
        if not ref:
            return {"score": 0.0, "reason": f"TER: empty reference"}
        n, m = len(ref), len(hyp)
        dp = list(range(m + 1))
        for i in range(1, n + 1):
            prev = dp[:]
            dp[0] = i
            for j in range(1, m + 1):
                cost = 0 if ref[i-1] == hyp[j-1] else 1
                dp[j] = min(dp[j-1]+1, prev[j]+1, prev[j-1]+cost)
        ter = dp[m] / len(ref)
        score = max(0.0, min(1.0, 1.0 - ter))
        return {"score": float(score), "reason": f"TER: {ter:.4f} ({dp[m]} edits / {len(ref)} words)"}
