eval_id: 163
name: word_error_rate
description: Computes Word Error Rate (WER) for ASR/STT evaluation. WER measures the edit distance at the word level between
  reference and hypothesis transcriptions. Returns 1-WER as score (higher=better).
criteria: Measures speech recognition accuracy by counting word-level insertions, deletions, and substitutions.
eval_tags:
- NLP Metrics
- Audio
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: Ground truth transcription
    hypothesis: ASR/STT output transcription
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        reference = kwargs.get("reference", expected or "")
        hypothesis = kwargs.get("hypothesis", output or "")
        ref_words = str(reference).strip().lower().split()
        hyp_words = str(hypothesis).strip().lower().split()
        if not ref_words and not hyp_words:
            return {"score": 1.0, "reason": "WER: 0.0% (both empty)"}
        if not ref_words:
            return {"score": 0.0, "reason": f"WER: 100%+ ({len(hyp_words)} insertions)"}
        n, m = len(ref_words), len(hyp_words)
        dp = list(range(m + 1))
        for i in range(1, n + 1):
            prev = dp[:]
            dp[0] = i
            for j in range(1, m + 1):
                cost = 0 if ref_words[i-1] == hyp_words[j-1] else 1
                dp[j] = min(dp[j-1]+1, prev[j]+1, prev[j-1]+cost)
        distance = dp[m]
        wer = distance / len(ref_words)
        score = max(0.0, 1.0 - wer)
        return {"score": float(score), "reason": f"WER: {wer*100:.1f}% ({distance} edits / {len(ref_words)} words)"}
