eval_id: 148
name: is_xml
description: Validates if text is well-formed XML. Checks that the text can be parsed as a valid XML document.
eval_tags:
- Output Format
- Code
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    text: The text to validate as XML
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import re
        import xml.etree.ElementTree as ET
        text = str(kwargs.get("text", output or "")).strip()
        if not text:
            return {"score": 0.0, "reason": "Empty text is not valid XML"}
        if re.search(r"<!DOCTYPE\b", text, flags=re.IGNORECASE):
            return {"score": 0.0, "reason": "DOCTYPE declarations are rejected (XXE / billion-laughs risk)"}
        if re.search(r"<!ENTITY\b", text, flags=re.IGNORECASE):
            return {"score": 0.0, "reason": "ENTITY declarations are rejected (billion-laughs risk)"}
        try:
            ET.fromstring(text)
            return {"score": 1.0, "reason": "Text is valid XML"}
        except ET.ParseError as e:
            return {"score": 0.0, "reason": f"Text is not valid XML: {e}"}
