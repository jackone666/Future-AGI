eval_id: 169
name: precision_score
description: Computes classification precision (TP / (TP + FP)) for binary or multiclass tasks. Measures how many positive predictions
  are actually correct.
criteria: Measures the fraction of positive predictions that are truly positive.
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - output
  - expected
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  function_params_schema:
    positive_label:
      type: string
      default: null
      required: true
  config_params_desc:
    output: Predicted label(s)
    expected: Expected label(s)
    positive_label: Label considered positive (auto-detected if empty)
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        def _parse(val):
            if val is None:
                return []
            if isinstance(val, list):
                return [str(v).strip().lower() for v in val]
            if isinstance(val, str):
                try:
                    p = json.loads(val)
                    if isinstance(p, list):
                        return [str(v).strip().lower() for v in p]
                except (json.JSONDecodeError, ValueError):
                    pass
                return [val.strip().lower()]
            return [str(val).strip().lower()]
        preds = _parse(kwargs.get("output", output))
        labels = _parse(kwargs.get("expected", expected))
        if not preds and not labels:
            return {"score": 1.0, "reason": "Both empty"}
        if len(preds) != len(labels):
            return {"score": 0.0, "reason": f"Length mismatch: {len(preds)} vs {len(labels)}"}
        pos_label = kwargs.get("positive_label")
        if pos_label is None:
            return {"score": 0.0, "reason": "positive_label is required"}
        pos = str(pos_label).lower()
        tp = sum(1 for p, l in zip(preds, labels) if p == pos and l == pos)
        fp = sum(1 for p, l in zip(preds, labels) if p == pos and l != pos)
        if tp + fp == 0:
            return {"score": 0.0, "reason": f"No positive predictions for '{pos}'"}
        prec = tp / (tp + fp)
        return {"score": float(prec), "reason": f"Precision: {prec:.4f} (TP={tp}, FP={fp})"}
