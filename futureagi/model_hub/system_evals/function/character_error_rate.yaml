eval_id: 164
name: character_error_rate
description: Computes Character Error Rate (CER) for ASR/OCR evaluation. CER measures character-level edit distance between
  reference and hypothesis. Returns 1-CER as score (higher=better).
criteria: Measures transcription/OCR accuracy at the character level.
eval_tags:
- NLP Metrics
- Audio
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: Ground truth text
    hypothesis: OCR/ASR output text
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        reference = str(kwargs.get("reference", expected or "")).strip().lower()
        hypothesis = str(kwargs.get("hypothesis", output or "")).strip().lower()
        if not reference and not hypothesis:
            return {"score": 1.0, "reason": "CER: 0.0% (both empty)"}
        if not reference:
            return {"score": 0.0, "reason": f"CER: 100%+ ({len(hypothesis)} insertions)"}
        n, m = len(reference), len(hypothesis)
        dp = list(range(m + 1))
        for i in range(1, n + 1):
            prev = dp[:]
            dp[0] = i
            for j in range(1, m + 1):
                cost = 0 if reference[i-1] == hypothesis[j-1] else 1
                dp[j] = min(dp[j-1]+1, prev[j]+1, prev[j-1]+cost)
        distance = dp[m]
        cer = distance / len(reference)
        score = max(0.0, 1.0 - cer)
        return {"score": float(score), "reason": f"CER: {cer*100:.1f}% ({distance} edits / {len(reference)} chars)"}
