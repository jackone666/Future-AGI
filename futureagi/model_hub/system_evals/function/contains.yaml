eval_id: 43
name: contains
description: Checks if the text contains a specific keyword
eval_tags:
- Output Validation
- Text
visible_ui: false
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config:
    keyword:
      type: string
      default: null
    case_sensitive:
      type: boolean
      default: true
  config_params_desc:
    text: The input text to be evaluated
    keyword: The keyword to search for in the text
    case_sensitive: Whether the keyword search should be case-sensitive
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        text = kwargs.get("text", output or "")
        keyword = kwargs.get("keyword", "")
        case_sensitive = kwargs.get("case_sensitive", True)
        if not keyword:
            return {"score": 0.0, "reason": "No keyword provided"}
        text = str(text)
        keyword = str(keyword)
        if not case_sensitive:
            text = text.lower()
            keyword = keyword.lower()
        if keyword in text:
            return {"score": 1.0, "reason": f"Keyword '{keyword}' found in output"}
        else:
            return {"score": 0.0, "reason": f"Keyword '{keyword}' not found in output"}
