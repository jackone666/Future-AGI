eval_id: 142
name: chrf_score
description: Computes ChrF score (character n-gram F-score). More robust than BLEU for morphologically rich languages and short
  texts. Uses character-level n-grams up to order 6 with recall-weighted F-score.
criteria: Measures text similarity using character-level n-gram precision and recall.
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  function_params_schema:
    n:
      type: integer
      default: 6
      minimum: 1
      maximum: 10
    beta:
      type: number
      default: 2.0
      minimum: 0.1
  config_params_desc:
    reference: The reference/expected text
    hypothesis: The generated/output text
    n: Maximum character n-gram order (default 6)
    beta: Recall weight factor (default 2.0, recall twice as important as precision)
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        from collections import Counter
        reference = kwargs.get("reference", expected or "")
        hypothesis = kwargs.get("hypothesis", output or "")
        n = int(kwargs.get("n", 6))
        beta = float(kwargs.get("beta", 2.0))
        if not reference or not hypothesis:
            return {"score": 0.0, "reason": "Missing reference or hypothesis"}
        ref_str = str(reference).strip()
        hyp_str = str(hypothesis).strip()
        total_prec = 0.0
        total_rec = 0.0
        count = 0
        for order in range(1, n + 1):
            ref_ng = Counter(ref_str[i:i+order] for i in range(len(ref_str)-order+1))
            hyp_ng = Counter(hyp_str[i:i+order] for i in range(len(hyp_str)-order+1))
            t_ref = sum(ref_ng.values())
            t_hyp = sum(hyp_ng.values())
            if t_hyp == 0 or t_ref == 0:
                continue
            clipped = sum(min(hyp_ng[ng], ref_ng[ng]) for ng in hyp_ng)
            total_prec += clipped / t_hyp
            total_rec += clipped / t_ref
            count += 1
        if count == 0:
            return {"score": 0.0, "reason": "ChrF: 0.0 (no character n-grams)"}
        avg_p = total_prec / count
        avg_r = total_rec / count
        if avg_p + avg_r == 0:
            return {"score": 0.0, "reason": "ChrF: 0.0"}
        b2 = beta ** 2
        score = max(0.0, min(1.0, (1 + b2) * avg_p * avg_r / (b2 * avg_p + avg_r)))
        return {"score": float(score), "reason": f"ChrF{n}: {score:.4f} (P={avg_p:.3f}, R={avg_r:.3f})"}
