eval_id: 160
name: ssim
description: Computes Structural Similarity Index (SSIM) between two images. Measures perceptual similarity based on luminance,
  contrast, and structure. Score ranges from 0 (completely different) to 1 (identical).
criteria: Measures perceptual image similarity using luminance, contrast, and structural components.
eval_tags:
- Image
- NLP Metrics
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - output
  - expected
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    output: Output image (URL, file path, or base64 string)
    expected: Reference image (URL, file path, or base64 string)
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import os, io, base64
        try:
            from PIL import Image
            import numpy as np
        except ImportError:
            return {"score": 0.0, "reason": "Requires PIL and numpy"}
        def _load(img):
            if isinstance(img, str) and os.path.isfile(img):
                return Image.open(img).convert("L")
            try:
                return Image.open(io.BytesIO(base64.b64decode(str(img)))).convert("L")
            except Exception:
                return None
        img1 = _load(kwargs.get("output", output))
        img2 = _load(kwargs.get("expected", expected))
        if img1 is None or img2 is None:
            return {"score": 0.0, "reason": "Cannot load one or both images"}
        if img1.size != img2.size:
            img2 = img2.resize(img1.size)
        a1 = np.array(img1, dtype=np.float64)
        a2 = np.array(img2, dtype=np.float64)
        C1 = (0.01*255)**2
        C2 = (0.03*255)**2
        mu1, mu2 = a1.mean(), a2.mean()
        s1, s2 = a1.var(), a2.var()
        s12 = ((a1-mu1)*(a2-mu2)).mean()
        ssim = ((2*mu1*mu2+C1)*(2*s12+C2))/((mu1**2+mu2**2+C1)*(s1+s2+C2))
        ssim = max(0.0, min(1.0, float(ssim)))
        return {"score": ssim, "reason": f"SSIM: {ssim:.4f}"}
