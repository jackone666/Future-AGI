eval_id: 168
name: accuracy
description: Computes classification accuracy by comparing predicted labels against expected labels. Accepts single values or
  JSON arrays of labels. Case-insensitive comparison.
criteria: Measures the fraction of correct predictions out of total predictions.
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - output
  - expected
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    output: Predicted label(s) - string, number, or JSON array
    expected: Expected label(s) - same format
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        def _parse(val):
            if val is None:
                return []
            if isinstance(val, list):
                return [str(v).strip().lower() for v in val]
            if isinstance(val, str):
                try:
                    p = json.loads(val)
                    if isinstance(p, list):
                        return [str(v).strip().lower() for v in p]
                except (json.JSONDecodeError, ValueError):
                    pass
                return [val.strip().lower()]
            return [str(val).strip().lower()]
        preds = _parse(kwargs.get("output", output))
        labels = _parse(kwargs.get("expected", expected))
        if not preds and not labels:
            return {"score": 1.0, "reason": "Both empty"}
        if len(preds) != len(labels):
            return {"score": 0.0, "reason": f"Length mismatch: {len(preds)} vs {len(labels)}"}
        correct = sum(1 for p, l in zip(preds, labels) if p == l)
        acc = correct / len(labels)
        return {"score": float(acc), "reason": f"Accuracy: {acc:.4f} ({correct}/{len(labels)})"}
