eval_id: 199
name: fleiss_kappa
description: "Computes Fleiss' Kappa for multi-rater agreement. Extends Cohen's Kappa to N raters. Input: matrix where rows=subjects, columns=categories, values=rater counts."
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions: {allow_edit: false, allow_copy: true}
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys: [output]
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc: {output: "Rating matrix as JSON: [[count_cat1, count_cat2, ...], ...] where each row is a subject"}
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        raw = kwargs.get("output", output)
        try:
            matrix = json.loads(str(raw)) if isinstance(raw, str) else raw
        except Exception:
            return {"score": 0.0, "reason": "Cannot parse matrix"}
        if not isinstance(matrix, list) or not matrix:
            return {"score": 0.0, "reason": "Invalid matrix"}
        if not all(isinstance(row, list) for row in matrix):
            return {"score": 0.0, "reason": "Matrix must be a list of lists"}
        k = len(matrix[0])
        if k == 0:
            return {"score": 0.0, "reason": "Empty matrix"}
        if any(len(row) != k for row in matrix):
            return {"score": 0.0, "reason": "Matrix rows must have identical column count"}
        if not all(isinstance(v, (int, float)) and v >= 0 for row in matrix for v in row):
            return {"score": 0.0, "reason": "Matrix values must be non-negative numbers"}
        row_sums = [sum(row) for row in matrix]
        N = row_sums[0]
        if N == 0:
            return {"score": 0.0, "reason": "Empty matrix"}
        if any(s != N for s in row_sums):
            return {"score": 0.0, "reason": "Each row must have the same total rater count"}
        n = len(matrix)
        pi = [sum(r * (r - 1) for r in row) / (N * (N - 1)) if N > 1 else 0 for row in matrix]
        P = sum(pi) / n
        pj = [sum(matrix[i][j] for i in range(n)) / (n * N) for j in range(k)]
        Pe = sum(p ** 2 for p in pj)
        kappa = (P - Pe) / (1 - Pe) if Pe < 1 else (1.0 if P == 1 else 0.0)
        kappa = max(-1.0, min(1.0, kappa))
        return {"score": float((kappa + 1) / 2), "reason": f"Fleiss Kappa: {kappa:.4f}"}
