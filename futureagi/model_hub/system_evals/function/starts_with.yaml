eval_id: 30
name: starts_with
description: Checks if text begins with specific substring
eval_tags:
- Output Validation
- Text
visible_ui: false
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config:
    substring:
      type: string
      default: null
    case_sensitive:
      type: boolean
      default: true
  config_params_desc:
    text: The input text to be evaluated
    substring: The substring to check for at the start of the text
    case_sensitive: Whether the comparison should be case-sensitive
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        text = kwargs.get("text", output or "")
        substring = kwargs.get("substring", "")
        case_sensitive = kwargs.get("case_sensitive", True)
        if not substring:
            return {"score": 0.0, "reason": "No substring provided"}
        text = str(text)
        substring = str(substring)
        if not case_sensitive:
            text = text.lower()
            substring = substring.lower()
        if text.startswith(substring):
            return {"score": 1.0, "reason": "Output starts with '" + substring + "'"}
        else:
            return {"score": 0.0, "reason": "Output does not start with '" + substring + "'"}
