eval_id: 44
name: contains_any
description: Checks if the text contains any of the specified keywords
eval_tags:
- Output Validation
- Text
visible_ui: false
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: pass_fail
pass_threshold: 0.5
config:
  required_keys:
  - text
  output: Pass/Fail
  eval_type_id: CustomCodeEval
  config:
    keywords:
      type: list
      default: []
    case_sensitive:
      type: boolean
      default: true
  config_params_desc:
    text: The input text to be evaluated
    keywords: List of keywords to search for in the text
    case_sensitive: Whether the keyword search should be case-sensitive
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        text = kwargs.get("text", output or "")
        keywords = kwargs.get("keywords", [])
        case_sensitive = kwargs.get("case_sensitive", True)
        text = str(text)
        if isinstance(keywords, str):
            keywords = [k.strip() for k in keywords.split(",")]
        else:
            keywords = [str(k).strip() for k in keywords]
        if not keywords:
            return {"score": 0.0, "reason": "No keywords provided"}
        if not case_sensitive:
            text = text.lower()
            keywords = [k.lower() for k in keywords]
        found = [k for k in keywords if k in text]
        if found:
            return {"score": 1.0, "reason": "Keywords found: " + ", ".join(found)}
        else:
            return {"score": 0.0, "reason": "No keywords found in output"}
