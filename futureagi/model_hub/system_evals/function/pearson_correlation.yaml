eval_id: 180
name: pearson_correlation
description: Computes Pearson correlation coefficient between two sets of numeric values. Measures linear relationship strength (-1 to 1, normalized to 0-1).
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions: {allow_edit: false, allow_copy: true}
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys: [output, expected]
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    output: Predicted values (JSON array of numbers or comma-separated)
    expected: Actual values (same format)
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        def _p(v):
            if isinstance(v, list): return [float(x) for x in v]
            if isinstance(v, str):
                try:
                    p = json.loads(v)
                    if isinstance(p, list): return [float(x) for x in p]
                except: pass
                return [float(x.strip()) for x in v.split(",") if x.strip()]
            return [float(v)]
        x = _p(kwargs.get("output", output))
        y = _p(kwargs.get("expected", expected))
        if len(x) != len(y) or len(x) < 2:
            return {"score": 0.0, "reason": "Need >= 2 paired values"}
        n = len(x)
        mx, my = sum(x)/n, sum(y)/n
        num = sum((xi-mx)*(yi-my) for xi,yi in zip(x,y))
        den = (sum((xi-mx)**2 for xi in x) * sum((yi-my)**2 for yi in y))**0.5
        r = num/den if den > 0 else 0.0
        score = (r+1)/2
        return {"score": float(score), "reason": f"Pearson r={r:.4f}"}
