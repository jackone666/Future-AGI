eval_id: 185
name: f_beta_score
description: Computes F-beta score with configurable beta for precision/recall weighting. Beta<1 favors precision, beta>1 favors recall.
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions: {allow_edit: false, allow_copy: true}
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys: [output, expected]
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  function_params_schema:
    beta: {type: number, default: 1.0, minimum: 0.01}
    positive_label: {type: string, default: null, required: true}
  config_params_desc: {output: Predicted labels, expected: True labels, beta: "Beta weight (default 1.0)", positive_label: "Positive class label"}
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        def _parse(val):
            if val is None:
                return []
            if isinstance(val, list):
                return [str(v).strip().lower() for v in val]
            if isinstance(val, str):
                try:
                    p = json.loads(val)
                    if isinstance(p, list):
                        return [str(v).strip().lower() for v in p]
                except (json.JSONDecodeError, ValueError):
                    pass
                return [val.strip().lower()]
            return [str(val).strip().lower()]
        preds = _parse(kwargs.get("output", output))
        labels = _parse(kwargs.get("expected", expected))
        if not preds and not labels:
            return {"score": 1.0, "reason": "Both empty"}
        if len(preds) != len(labels):
            return {"score": 0.0, "reason": f"Length mismatch: {len(preds)} vs {len(labels)}"}
        beta = float(kwargs.get("beta", 1.0))
        positive_label = kwargs.get("positive_label")
        if positive_label is None:
            return {"score": 0.0, "reason": "positive_label is required"}
        pos = str(positive_label).lower()
        tp = sum(1 for p,l in zip(preds,labels) if p==pos and l==pos)
        fp = sum(1 for p,l in zip(preds,labels) if p==pos and l!=pos)
        fn = sum(1 for p,l in zip(preds,labels) if p!=pos and l==pos)
        prec = tp/(tp+fp) if tp+fp > 0 else 0.0
        rec = tp/(tp+fn) if tp+fn > 0 else 0.0
        if prec+rec == 0: return {"score": 0.0, "reason": f"F{beta}: 0.0"}
        b2 = beta**2
        fb = (1+b2)*prec*rec/(b2*prec+rec)
        return {"score": float(fb), "reason": f"F{beta}: {fb:.4f} (P={prec:.4f}, R={rec:.4f})"}
