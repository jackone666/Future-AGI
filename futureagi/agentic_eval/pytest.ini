[pytest]
# Pytest configuration for agentic_eval

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --color=yes
    --maxfail=5
    --ignore=agenthub.egg-info
    --ignore=.pytest_cache
    --ignore=htmlcov
    --ignore=test-reports

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    serial: Tests that must run serially (not in parallel)
    network: Tests requiring network access
    serving: Model serving related tests
    embedding: Embedding functionality tests
    agents: Agent-related tests
    evaluations: Evaluation tests
    performance: Performance tests
    clickhouse: Tests requiring ClickHouse

# Minimum Python version
minversion = 3.8

# Environment variables for tests
# env =
#     TESTING=true
#     PYTHONDONTWRITEBYTECODE=1

# Disable warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore::RuntimeWarning

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    setup.py
    */venv/*
    */__pycache__/*
    agenthub.egg-info/*
    core/results/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.
    class .*\(Protocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2 