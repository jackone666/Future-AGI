[pytest]
# Core Django backend tests only
# model_serving and agentic_eval have their own pytest.ini

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Discover tests recursively, excluding these directories
norecursedirs =
    .venv
    .git
    .uv-cache
    node_modules
    agentic_eval
    model_serving
    turing_api
    management
    scripts
    __pycache__
    *.egg-info

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --reuse-db
    -p no:warnings
    -m "not live_llm and not e2e and not vapi and not phone"

markers =
    unit: Fast tests, no external services
    integration: Requires database/services
    slow: Long running tests
    api: API endpoint tests
    core_backend: Core backend functionality tests
    e2e: End-to-end tests
    external: Tests requiring external services
    live_llm: Tests requiring live LLM API calls
    vapi: Tests requiring VAPI service
    phone: Tests requiring phone/telephony services

DJANGO_SETTINGS_MODULE = tfc.settings.test

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
