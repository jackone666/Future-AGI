# Agentcc Gateway Configuration
# Copy to config.yaml and update with your settings.

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 5s
  write_timeout: 300s
  idle_timeout: 120s
  shutdown_timeout: 30s
  max_request_body_size: 10485760  # 10MB
  default_request_timeout: 60s

providers:
  openai:
    base_url: "https://api.openai.com"
    api_key: "${OPENAI_API_KEY}"  # Set via env var
    api_format: "openai"
    default_timeout: 60s
    max_concurrent: 100
    conn_pool_size: 100
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-3.5-turbo
      - o1
      - o1-mini

  # anthropic:
