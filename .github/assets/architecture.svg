<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111113"/>
    </linearGradient>

    <linearGradient id="client-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f23"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2540"/>
      <stop offset="1" stop-color="#0a1c30"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052e2e"/>
      <stop offset="1" stop-color="#03221f"/>
    </linearGradient>
    <linearGradient id="data-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#201a3a"/>
      <stop offset="1" stop-color="#171135"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g fill="#27272a" opacity="0.5">
    <g id="dot-grid"></g>
  </g>
  <script type="application/javascript"><![CDATA[
    // (Static SVG — grid generated at write time below)
  ]]></script>

  <!-- ───── CLIENT LAYER ───── -->
  <g filter="url(#soft-shadow)">
    <rect x="60" y="50" width="1080" height="110" rx="16" fill="url(#client-grad)" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="90" y="82" font-size="13" font-weight="600" fill="#a1a1aa" letter-spacing="1.5">🧑‍💻 &nbsp; YOUR APP OR AGENT</text>

    <g transform="translate(90,100)">
      <rect width="180" height="44" rx="10" fill="#27272a" stroke="#52525b"/>
      <text x="90" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fafafa">Python</text>
    </g>
    <g transform="translate(290,100)">
      <rect width="180" height="44" rx="10" fill="#27272a" stroke="#52525b"/>
      <text x="90" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fafafa">TypeScript</text>
    </g>
    <g transform="translate(490,100)">
      <rect width="180" height="44" rx="10" fill="#27272a" stroke="#52525b"/>
      <text x="90" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fafafa">Go · Java · C#</text>
    </g>
    <g transform="translate(690,100)">
      <rect width="420" height="44" rx="10" fill="#27272a" stroke="#52525b"/>
      <text x="210" y="28" text-anchor="middle" font-size="13" font-weight="500" fill="#d4d4d8">LangChain · LlamaIndex · CrewAI · AutoGen · DSPy</text>
    </g>
  </g>

  <!-- Connections from clients to edge -->
  <path d="M 320 160 Q 320 195 320 215" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="335" y="200" font-size="12" font-weight="600" fill="#60a5fa">OTLP traces</text>

  <path d="M 880 160 Q 880 195 880 215" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="895" y="200" font-size="12" font-weight="600" fill="#60a5fa">OpenAI-compatible HTTP</text>

  <!-- ───── EDGE LAYER ───── -->
  <g filter="url(#soft-shadow)">
    <rect x="60" y="215" width="1080" height="130" rx="16" fill="url(#edge-grad)" stroke="#1e40af" stroke-width="1.5"/>
    <text x="90" y="247" font-size="13" font-weight="600" fill="#93c5fd" letter-spacing="1.5">📡 &nbsp; EDGE — tracing &amp; gateway</text>

    <!-- traceAI card -->
    <g transform="translate(90,265)">
      <rect width="480" height="65" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="20" y="26" font-size="16" font-weight="700" fill="#dbeafe">🛰️ &nbsp; traceAI</text>
      <text x="20" y="48" font-size="12" fill="#93c5fd">OpenTelemetry instrumentation · zero-config</text>
      <text x="460" y="28" text-anchor="end" font-size="12" font-weight="600" fill="#60a5fa">50+ frameworks</text>
      <text x="460" y="48" text-anchor="end" font-size="12" font-weight="600" fill="#60a5fa">4 languages</text>
    </g>

    <!-- Agent Command Center card -->
    <g transform="translate(630,265)">
      <rect width="480" height="65" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="20" y="26" font-size="16" font-weight="700" fill="#dbeafe">🚪 &nbsp; Agent Command Center <tspan font-size="12" font-weight="500" fill="#93c5fd">(Go)</tspan></text>
      <text x="20" y="48" font-size="12" fill="#93c5fd">routing · caching · budgets · virtual keys · guardrails</text>
      <text x="460" y="28" text-anchor="end" font-size="12" font-weight="600" fill="#60a5fa">100+ providers</text>
      <text x="460" y="48" text-anchor="end" font-size="12" font-weight="600" fill="#60a5fa">&lt; 10 ms guardrails</text>
    </g>
  </g>

  <!-- Connections edge → core -->
  <path d="M 330 345 Q 330 385 330 400" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 870 345 Q 870 385 870 400" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- ───── CORE PLATFORM ───── -->
  <g filter="url(#soft-shadow)">
    <rect x="60" y="400" width="1080" height="200" rx="16" fill="url(#core-grad)" stroke="#059669" stroke-width="1.5"/>
    <text x="90" y="432" font-size="13" font-weight="600" fill="#6ee7b7" letter-spacing="1.5">🛠️ &nbsp; FUTURE AGI CORE — Django + Channels</text>

    <!-- Pillar 1: Simulate -->
    <g transform="translate(90,452)">
      <rect width="330" height="130" rx="12" fill="#052e2e" stroke="#10b981" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#d1fae5">🎭 &nbsp; Simulate &amp; Iterate</text>
      <text x="20" y="54" font-size="12" fill="#a7f3d0">• simulations &amp; scenarios</text>
      <text x="20" y="74" font-size="12" fill="#a7f3d0">• agent IDE</text>
      <text x="20" y="94" font-size="12" fill="#a7f3d0">• datasets &amp; experiments</text>
      <text x="20" y="114" font-size="12" fill="#a7f3d0">• voice (LiveKit · VAPI · Retell)</text>
    </g>

    <!-- Pillar 2: Evaluate -->
    <g transform="translate(435,452)">
      <rect width="330" height="130" rx="12" fill="#052e2e" stroke="#10b981" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#d1fae5">✅ &nbsp; Evaluate</text>
      <text x="20" y="54" font-size="12" fill="#a7f3d0">• agentic_eval <tspan fill="#6ee7b7" font-weight="600">(90+ metrics)</tspan></text>
      <text x="20" y="74" font-size="12" fill="#a7f3d0">• error feeds &amp; root-cause</text>
      <text x="20" y="94" font-size="12" fill="#a7f3d0">• Protect <tspan fill="#6ee7b7" font-weight="600">(&lt; 10 ms guardrails)</tspan></text>
      <text x="20" y="114" font-size="12" fill="#a7f3d0">• benchmarks · CI evaluators</text>
    </g>

    <!-- Pillar 3: Observe -->
    <g transform="translate(780,452)">
      <rect width="330" height="130" rx="12" fill="#052e2e" stroke="#10b981" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#d1fae5">📡 &nbsp; Optimize &amp; Observe</text>
      <text x="20" y="54" font-size="12" fill="#a7f3d0">• tracer ingest &amp; span graph</text>
      <text x="20" y="74" font-size="12" fill="#a7f3d0">• analytics &amp; AI alerting</text>
      <text x="20" y="94" font-size="12" fill="#a7f3d0">• Agent Opt <tspan fill="#6ee7b7" font-weight="600">(6 algorithms)</tspan></text>
      <text x="20" y="114" font-size="12" fill="#a7f3d0">• RL from human feedback</text>
    </g>
  </g>

  <!-- Connections core → data -->
  <path d="M 260 600 Q 260 635 260 650" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <path d="M 490 600 Q 490 635 490 650" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <path d="M 720 600 Q 720 635 720 650" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <path d="M 950 600 Q 950 635 950 650" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>

  <!-- ───── DATA LAYER ───── -->
  <g filter="url(#soft-shadow)">
    <rect x="60" y="650" width="1080" height="80" rx="16" fill="url(#data-grad)" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="90" y="680" font-size="13" font-weight="600" fill="#c4b5fd" letter-spacing="1.5">💾 &nbsp; DATA &amp; INFRA</text>

    <g transform="translate(170,658)">
      <rect width="180" height="55" rx="10" fill="#1f1b2e" stroke="#8b5cf6"/>
      <text x="90" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#ede9fe">PostgreSQL</text>
      <text x="90" y="42" text-anchor="middle" font-size="11" fill="#c4b5fd">metadata</text>
    </g>
    <g transform="translate(400,658)">
      <rect width="180" height="55" rx="10" fill="#1f1b2e" stroke="#8b5cf6"/>
      <text x="90" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#ede9fe">ClickHouse</text>
      <text x="90" y="42" text-anchor="middle" font-size="11" fill="#c4b5fd">spans · time-series</text>
    </g>
    <g transform="translate(630,658)">
      <rect width="180" height="55" rx="10" fill="#1f1b2e" stroke="#8b5cf6"/>
      <text x="90" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#ede9fe">Redis</text>
      <text x="90" y="42" text-anchor="middle" font-size="11" fill="#c4b5fd">locks · pub/sub · state</text>
    </g>
    <g transform="translate(860,658)">
      <rect width="180" height="55" rx="10" fill="#1f1b2e" stroke="#8b5cf6"/>
      <text x="90" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#ede9fe">RabbitMQ + Temporal</text>
      <text x="90" y="42" text-anchor="middle" font-size="11" fill="#c4b5fd">jobs · workflows</text>
    </g>
  </g>

</svg>
