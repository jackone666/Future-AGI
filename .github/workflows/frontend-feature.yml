name: Frontend Feature Branch Pipeline

on:
  push:
    branches: [feat/*, fix/*, chore/*, docs/*, refactor/*, test/*, perf/*]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-feature.yml'

jobs:
  # Branch name validation
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          echo "🔍 Validating branch name: ${{ github.ref_name }}"

          # Get branch name (handle both push and PR events)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            branch_name="${{ github.head_ref }}"
          else
            branch_name="${{ github.ref_name }}"
          fi

          echo "Branch name: $branch_name"

          # Define the regex pattern for valid branch names
          # Types match Conventional Commits prefixes used in CONTRIBUTING.md.
          branch_regex="^(feat|fix|chore|docs|refactor|test|perf)\/[a-zA-Z0-9]+([a-zA-Z0-9\-]*[a-zA-Z0-9])?$"

          # Validate branch name
          if [[ ! $branch_name =~ $branch_regex ]]; then
            echo "❌ Invalid branch name: '$branch_name'"
            echo "Please see BRANCH_NAMING_CONVENTION.md for guidelines"
            exit 1
          fi

          echo "✅ Branch name '$branch_name' is valid"

  # Essential tests for feature branches
  essential-tests:
    runs-on: ubuntu-latest
    needs: validate-branch-name
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Run unit tests
        run: yarn test:unit
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build check
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  # Extract branch info and add PR comment
  branch-info:
    runs-on: ubuntu-latest
    needs: [validate-branch-name, essential-tests]
    if: github.event_name == 'pull_request'
    steps:
      - name: Extract branch info and comment
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ github.head_ref }}';
            const [type, description] = branchName.split('/');

            const typeEmojis = {
              'feature': '✨',
              'bugfix': '🐛',
              'hotfix': '🚨',
              'refactor': '♻️',
              'docs': '📚',
              'test': '🧪',
              'chore': '🔧',
              'release': '🚀'
            };

            const emoji = typeEmojis[type] || '📝';

            const comment = `## ${emoji} Feature Branch Validation Passed

            **Branch Name:** \`${branchName}\`
            **Type:** ${type}
            **Description:** ${description}

            ✅ Branch naming convention: PASSED
            ✅ Type checking: PASSED
            ✅ Unit tests: PASSED
            ✅ Build check: PASSED

            Ready for review! 🎉`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Feature branch summary
  feature-summary:
    runs-on: ubuntu-latest
    needs: [validate-branch-name, essential-tests]
    if: always()
    steps:
      - name: Feature Branch Summary
        run: |
          echo "## ✨ Feature Branch Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch Validation: ${{ needs.validate-branch-name.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Essential Tests: ${{ needs.essential-tests.result }}" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.validate-branch-name.result }}" == "success" && "${{ needs.essential-tests.result }}" == "success" ]]; then
            echo "✅ All feature branch checks passed!" >> $GITHUB_STEP_SUMMARY
            echo "Ready to merge into develop branch 🚀" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed - Please fix before merging" >> $GITHUB_STEP_SUMMARY
          fi
