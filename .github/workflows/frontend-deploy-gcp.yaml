name: Frontend Deploy GCP on Merge

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy-gcp.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn

      - name: Create .env file from secrets
        run: |
          cat <<EOF > .env
          VITE_ENVIRONMENT=dev
          VITE_HOST_API=${{ secrets.GCP_VITE_HOST_API }}
          VITE_ASSETS_API=${{ secrets.GCP_VITE_ASSETS_API }}
          VITE_GENERATE_LINK=${{ secrets.GCP_VITE_GENERATE_LINK }}
          VITE_HELP_LINK=${{ secrets.GCP_VITE_HELP_LINK }}
          VITE_GOOGLE_SITE_KEY=${{ secrets.GCP_VITE_GOOGLE_SITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.GCP_VITE_MIXPANEL_TOKEN }}
          VITE_STRIPE_PUBLIC_KEY=${{ secrets.GCP_VITE_STRIPE_PUBLIC_KEY }}
          VITE_AG_GRID_LICENSE_KEY=${{ secrets.GCP_VITE_AG_GRID_LICENSE_KEY }}
          VITE_PENDO_API_KEY=${{ secrets.GCP_VITE_PENDO_API_KEY }}
          VITE_POSTHOG_KEY=${{ secrets.GCP_VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST=${{ secrets.GCP_VITE_POSTHOG_HOST }}
          EOF

      - name: Build project
        run: yarn build

      # Authenticate with GCP using Service Account JSON
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Install gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Hashed assets (Vite content-hashed filenames in /assets/) — safe
      # to cache forever.
      - name: Upload hashed assets with long-lived immutable cache
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            rsync -R -d dist/assets/ gs://${{ secrets.GCP_BUCKET_NAME }}/assets/

      # Non-hashed root files (index.html, config.js, favicons) must NOT
      # be cached. -x "^assets/" excludes hashed assets from this pass.
      - name: Upload root files with no-cache
        run: |
          gsutil -m -h "Cache-Control:no-cache, must-revalidate" \
            rsync -R -d -x "^assets/" dist/ gs://${{ secrets.GCP_BUCKET_NAME }}

      # Invalidate Cloud CDN cache
      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ secrets.GCP_URL_MAP_NAME }} \
            --path "/*" \
            --project=${{ secrets.GCP_PROJECT_ID }}
