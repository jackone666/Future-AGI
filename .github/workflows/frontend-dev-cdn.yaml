name: Deploy Frontend to Dev CDN

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-dev-cdn.yaml'
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "dev"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn

      - name: Create .env file from secrets
        run: |
          cat <<EOF > .env
          VITE_ENVIRONMENT=dev
          VITE_HOST_API=${{ secrets.DEV_VITE_HOST_API }}
          VITE_ASSETS_API=${{ secrets.DEV_VITE_ASSETS_API }}
          VITE_GENERATE_LINK=${{ secrets.DEV_VITE_GENERATE_LINK }}
          VITE_HELP_LINK=${{ secrets.DEV_VITE_HELP_LINK }}
          VITE_GOOGLE_SITE_KEY=${{ secrets.DEV_VITE_GOOGLE_SITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.DEV_VITE_MIXPANEL_TOKEN }}
          VITE_STRIPE_PUBLIC_KEY=${{ secrets.DEV_VITE_STRIPE_PUBLIC_KEY }}
          VITE_AG_GRID_LICENSE_KEY=${{ secrets.DEV_VITE_AG_GRID_LICENSE_KEY }}
          VITE_PENDO_API_KEY=${{ secrets.DEV_VITE_PENDO_API_KEY }}
          VITE_POSTHOG_KEY=${{ secrets.DEV_VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST=${{ secrets.DEV_VITE_POSTHOG_HOST }}
          AWS_REGION=${{ secrets.DEV_AWS_REGION }}
          S3_BUCKET_NAME=${{ secrets.DEV_S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
          EOF

      - name: Build project
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.DEV_S3_BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
