name: Deploy EU Frontend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  deploy-eu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'

      - name: Install dependencies
        run: yarn

      - name: Create .env file from secrets
        run: |
          cat <<EOF > .env
          VITE_ENVIRONMENT=production
          VITE_HOST_API=${{ secrets.EU_VITE_HOST_API }}
          VITE_ASSETS_API=${{ secrets.EU_VITE_ASSETS_API }}
          VITE_GENERATE_LINK=${{ secrets.EU_VITE_GENERATE_LINK }}
          VITE_HELP_LINK=${{ secrets.PROD_VITE_HELP_LINK }}
          VITE_GOOGLE_SITE_KEY=${{ secrets.PROD_VITE_GOOGLE_SITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.PROD_VITE_MIXPANEL_TOKEN }}
          VITE_STRIPE_PUBLIC_KEY=${{ secrets.PROD_VITE_STRIPE_PUBLIC_KEY }}
          VITE_AG_GRID_LICENSE_KEY=${{ secrets.PROD_VITE_AG_GRID_LICENSE_KEY }}
          VITE_SENTRY_DSN=${{ secrets.PROD_VITE_SENTRY_DSN }}
          VITE_MIXPANEL_HOST=${{ secrets.EU_VITE_MIXPANEL_HOST }}
          VITE_POSTHOG_KEY=${{ secrets.PROD_VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST=${{ secrets.PROD_VITE_POSTHOG_HOST }}
          EOF

      - name: Build project
        run: yarn build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Hashed assets (Vite emits content-hashed filenames in /assets/) —
      # safe to cache forever.
      - name: Upload hashed assets with long-lived immutable cache
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            rsync -R -d dist/assets/ gs://futureagi-frontend-eu/assets/

      # Non-hashed root files (index.html, config.js, favicons) must NOT
      # be cached. Browsers/CDN must re-validate on every request so a new
      # deploy is picked up immediately. -x "^assets/" excludes hashed
      # assets from this pass.
      - name: Upload root files with no-cache
        run: |
          gsutil -m -h "Cache-Control:no-cache, must-revalidate" \
            rsync -R -d -x "^assets/" dist/ gs://futureagi-frontend-eu

      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache futureagi-frontend-eu-url-map \
            --path "/*" \
            --project=${{ secrets.GCP_PROJECT_ID }}
