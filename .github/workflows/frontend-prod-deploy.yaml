name: Deploy Frontend to Production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'

      - name: Install dependencies
        run: yarn

      - name: Create .env file from secrets
        run: |
          cat <<EOF > .env
          VITE_ENVIRONMENT=production
          VITE_HOST_API=${{ secrets.PROD_VITE_HOST_API }}
          VITE_ASSETS_API=${{ secrets.PROD_VITE_ASSETS_API }}
          VITE_GENERATE_LINK=${{ secrets.PROD_VITE_GENERATE_LINK }}
          VITE_HELP_LINK=${{ secrets.PROD_VITE_HELP_LINK }}
          VITE_GOOGLE_SITE_KEY=${{ secrets.PROD_VITE_GOOGLE_SITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.PROD_VITE_MIXPANEL_TOKEN }}
          VITE_STRIPE_PUBLIC_KEY=${{ secrets.PROD_VITE_STRIPE_PUBLIC_KEY }}
          VITE_AG_GRID_LICENSE_KEY=${{ secrets.PROD_VITE_AG_GRID_LICENSE_KEY }}
          VITE_PENDO_API_KEY=${{ secrets.PROD_VITE_PENDO_API_KEY }}
          VITE_SENTRY_DSN=${{ secrets.PROD_VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY=${{ secrets.PROD_VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST=${{ secrets.PROD_VITE_POSTHOG_HOST }}
          VITE_GOOGLE_ADS_ENABLED=true
          VITE_GOOGLE_ADS_ID=${{ secrets.PROD_VITE_GOOGLE_ADS_ID }}
          VITE_GOOGLE_ADS_SIGNUP_LABEL=${{ secrets.PROD_VITE_GOOGLE_ADS_SIGNUP_LABEL }}
          VITE_GA_ID=${{ secrets.PROD_VITE_GA_ID }}
          VITE_REDDIT_ADS_ENABLED=true
          VITE_REDDIT_PIXEL_ID=${{ secrets.PROD_VITE_REDDIT_PIXEL_ID }}
          VITE_TWITTER_ADS_ENABLED=true
          VITE_TWITTER_PIXEL_ID=${{ secrets.PROD_VITE_TWITTER_PIXEL_ID }}
          VITE_AD_CONVERSION_VALUE=${{ secrets.PROD_VITE_AD_CONVERSION_VALUE }}
          VITE_AD_CONVERSION_CURRENCY=${{ secrets.PROD_VITE_AD_CONVERSION_CURRENCY }}
          AWS_REGION=${{ secrets.PROD_AWS_REGION }}
          VITE_MIXPANEL_HOST=${{ secrets.PROD_VITE_MIXPANEL_HOST }}
          S3_BUCKET_NAME=${{ secrets.PROD_S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}
          EOF

      - name: Build project
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      # Hashed assets (Vite emits content-hashed filenames in /assets/) —
      # safe to cache forever. The --delete flag here cleans up old hashes
      # left behind by previous deploys.
      - name: Upload hashed assets with long-lived immutable cache
        run: |
          aws s3 sync dist/assets/ s3://${{ secrets.PROD_S3_BUCKET_NAME }}/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # Non-hashed files (index.html, config.js, favicons) — must NOT be
      # cached. Browsers/CDN must re-validate on every request so a new
      # deploy is picked up immediately. --exclude "assets/*" prevents
      # this step from re-uploading or deleting hashed assets.
      - name: Upload root files with no-cache
        run: |
          aws s3 sync dist/ s3://${{ secrets.PROD_S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
