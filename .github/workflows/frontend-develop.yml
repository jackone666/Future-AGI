name: Frontend Develop Branch Pipeline

on:
  push:
    branches: [develop, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-develop.yml'
  pull_request:
    branches: [main, develop, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-develop.yml'
  workflow_dispatch:

jobs:
  # Quality checks and unit tests
  quality-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Run unit tests
        run: yarn test:unit --coverage --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./frontend/coverage/lcov.info
          flags: develop-branch
          name: develop-coverage

  # Integration and component tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run integration tests
        run: yarn test:integration --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run all component tests
        run: yarn test:run --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Build validation
  build-check:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: develop-build
          path: frontend/dist/
          retention-days: 7

  # Performance tests (only on PRs)
  performance-tests:
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build app
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Start preview server
        run: yarn start &

      - name: Wait for server
        run: sleep 10

      - name: Run Lighthouse CI
        run: lhci autorun --upload.target=temporary-public-storage || echo "Lighthouse CI completed"
        continue-on-error: true

  # Summary for develop branch
  develop-summary:
    runs-on: ubuntu-latest
    needs: [quality-and-tests, integration-tests, build-check]
    if: always()
    steps:
      - name: Develop Branch Summary
        run: |
          echo "## 🔄 Develop Branch Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Quality & Tests: ${{ needs.quality-and-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Check: ${{ needs.build-check.result }}" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.quality-and-tests.result }}" == "success" && "${{ needs.integration-tests.result }}" == "success" && "${{ needs.build-check.result }}" == "success" ]]; then
            echo "✅ All checks passed - Ready for main branch merge!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed - Please review before merging" >> $GITHUB_STEP_SUMMARY
          fi
